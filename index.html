<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Safety & Hazard Management Simulator</title>
    <style>
        :root {
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-main: #1a202c;
            --text-muted: #4a5568;
            --primary: #2b6cb0;
            --primary-hover: #2c5282;
            --danger: #c53030;
            --success: #2f855a;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Prompt, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background: var(--card-bg);
            max-width: 700px;
            width: 100%;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            color: #2d3748;
            text-align: center;
        }

        h2 {
            font-size: 1.2rem;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 10px;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        .progress-bar {
            flex-grow: 1;
            height: 8px;
            background-color: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.4s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 35px;
        }

        .scenario-text {
            font-size: 1.1rem;
            margin-bottom: 30px;
            white-space: pre-line;
            color: #2d3748;
        }

        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        button {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 2px solid #cbd5e0;
            padding: 14px 20px;
            font-size: 0.95rem;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease-in-out;
            font-weight: 500;
        }

        button:hover {
            border-color: var(--primary);
            background-color: #ebf8ff;
            color: var(--primary);
            transform: translateX(2px);
        }

        .outcome-card {
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 1.05rem;
            display: none;
        }

        .outcome-card.success {
            display: block;
            background-color: #f0fff4;
            border: 1px solid var(--success);
            color: var(--success);
        }

        .outcome-card.danger {
            display: block;
            background-color: #fff5f5;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .restart-btn {
            background-color: #4a5568;
            color: white;
            border: none;
            text-align: center;
            margin-top: 25px;
            width: 100%;
            font-weight: 600;
        }
        
        .restart-btn:hover {
            background-color: #2d3748;
            color: white;
            transform: none;
        }
    </style>
</head>
<body>

<div class="game-container">
    <header>
        <h1 id="game-title">ระบบจำลองการจัดการเหตุฉุกเฉินและสารเคมีอันตราย</h1>
        <div class="progress-container">
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
            <span id="progress-lbl" class="progress-text">0%</span>
        </div>
    </header>

    <div id="outcome" class="outcome-card"></div>
    <h2 id="stage-title"></h2>
    <div id="scenario" class="scenario-text">กำลังโหลดระบบ...</div>
    <div id="choices" class="choices-container"></div>
</div>

            "options": [
                "1. บันทึกข้อมูลลงในสมุดแล็บส่วนตัวและนำเสนอในการประชุมกลุ่มแลบครั้งต่อไป",
                "2. แจ้งเรื่องด้วยวาจาต่อรุ่นพี่ในห้องปฏิบัติการและทำความสะอาดห้องให้เหมือนไม่มีอะไรเกิดขึ้น",
                "3. สรุปเหตุการณ์เมื่อสิ้นสุดภาคการศึกษาและส่งอาจารย์พร้อมรายงานผลการวิจัย",
                "4. กรอกแบบรายงาน SHECU.ACC.01 ออนไลน์ภายใน 3 วันหลังจากเกิดเหตุ"
            ],
            "correct": 4,
            "critical_error": null,
            "fail_message": null
        }
    ];

    let currentStageIndex = 0;

    function renderStage(index) {
        const outcomeCard = document.getElementById("outcome");
        const choicesContainer = document.getElementById("choices");
        
        // ล้างสถานะข้อความแจ้งเตือนเดิม
        outcomeCard.className = "outcome-card";
        outcomeCard.textContent = "";
        choicesContainer.innerHTML = "";

        // กรณีที่ผ่านหมดทุกด่าน (จบเกมแบบปลอดภัย)
        if (index >= stages.length) {
            document.getElementById("stage-title").textContent = "🎉 ยินดีด้วย! คุณผ่านการทดสอบ";
            document.getElementById("scenario").textContent = "คุณมีทักษะการจัดการความปลอดภัยและสารเคมีอันตรายในระดับยอดเยี่ยม สามารถปฏิบัติงานวิจัย ณ อาคารมหามกุฏได้อย่างปลอดภัย";
            document.getElementById("progress").style.width = "100%";
            document.getElementById("progress-lbl").textContent = "100%";
            
            const restartBtn = document.createElement("button");
            restartBtn.textContent = "เริ่มทำแบบทดสอบใหม่อีกครั้ง";
            restartBtn.classList.add("restart-btn");
            restartBtn.onclick = () => {
                currentStageIndex = 0;
                renderStage(currentStageIndex);
            };
            choicesContainer.appendChild(restartBtn);
            return;
        }

        const stage = stages[index];
        
        // อัปเดตเนื้อหาด่าน
        document.getElementById("stage-title").textContent = `ด่านที่ ${stage.id}: ${stage.title}`;
        document.getElementById("scenario").textContent = stage.story;

        // คำนวณและแสดงค่าความคืบหน้า (Progress Bar)
        const progressPercent = Math.round((index / stages.length) * 100);
        document.getElementById("progress").style.width = `${progressPercent}%`;
        document.getElementById("progress-lbl").textContent = `${progressPercent}%`;

        // สร้างปุ่มเลือกคำตอบ (ตัวเลือก 1-4)
        stage.options.forEach((option, optionIdx) => {
            const currentOptionNumber = optionIdx + 1; // เปลี่ยนเป็นเลขคำตอบเริ่มจาก 1
            const btn = document.createElement("button");
            btn.textContent = option;
            
            btn.onclick = () => handleAnswer(stage, currentOptionNumber);
            choicesContainer.appendChild(btn);
        });
    }

    function handleAnswer(stage, chosenOption) {
        const outcomeCard = document.getElementById("outcome");
        const choicesContainer = document.getElementById("choices");

        if (chosenOption === stage.correct) {
            // หากตอบถูก ให้ย้ายไปสเตจถัดไปทันที
            currentStageIndex++;
            renderStage(currentStageIndex);
        } else if (chosenOption === stage.critical_error) {
            // เกิดข้อผิดพลาดร้ายแรง (Critical Error)
            outcomeCard.classList.add("danger");
            outcomeCard.textContent = "⚠ CRITICAL ERROR: เกิดอุบัติเหตุร้ายแรง!";
            document.getElementById("scenario").textContent = stage.fail_message;
            choicesContainer.innerHTML = ""; // ล้างตัวเลือกทิ้ง

            // สร้างปุ่มรีสตาร์ทเพื่อเริ่มเกมใหม่
            const resetBtn = document.createElement("button");
            resetBtn.textContent = "กลับไปเริ่มด่านแรกใหม่";
            resetBtn.classList.add("restart-btn");
            resetBtn.onclick = () => {
                currentStageIndex = 0;
                renderStage(currentStageIndex);
            };
            choicesContainer.appendChild(resetBtn);
        } else {
            // หากเลือกคำตอบอื่นที่ผิด แต่ไม่ใช่ข้อวิกฤต (รวมถึงกรณีด่านที่ไม่มี critical error)
            outcomeCard.className = "outcome-card danger";
            outcomeCard.textContent = "❌ คำตอบไม่ถูกต้อง: วิธีปฏิบัตินี้ยังไม่ปลอดภัยพอ กรุณาพิจารณาใหม่อีกครั้ง";
        }
    }

    // เริ่มรันระบบครั้งแรก
    renderStage(currentStageIndex);
</script>

</body>
</html>
