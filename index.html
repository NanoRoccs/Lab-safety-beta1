<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Safety & Hazard Management Simulator</title>
    
    <!-- =================================================================
         [ส่วนที่ 1] การตกแต่งหน้าตาเกม (CSS)
         คุณสามารถแก้ไขโค้ดสีและขนาดฟอนต์ในส่วนนี้เพื่อเปลี่ยนหน้าตาเว็บได้
         ================================================================= -->
    <style>
        /* ตัวแปรเก็บค่าสีมาตรฐานของเว็บ (แก้ไขเปลี่ยนสีหลักที่นี่ได้เลย) */
        :root {
            --bg-color: #f7fafc;       /* สีพื้นหลังของเว็บไซต์ */
            --card-bg: #ffffff;        /* สีพื้นหลังของกล่องเกม */
            --text-main: #1a202c;      /* สีตัวอักษรหลัก */
            --text-muted: #4a5568;     /* สีตัวอักษรรอง/จาง */
            --primary: #2b6cb0;        /* สีน้ำเงินหลัก (ปุ่มทั่วไป/หัวข้อ) */
            --primary-hover: #2c5282;  /* สีปุ่มเวลานำเมาส์ไปชี้ */
            --danger: #c53030;         /* สีแดง (ใช้แจ้งเตือนเวลา Game Over) */
            --success: #2f855a;        /* สีเขียว (ใช้แสดงเวลาผ่านด่าน) */
            --border: #e2e8f0;         /* สีเส้นขอบ */
            --accent: #d69e2e;         /* สีทองเหลือง (ใช้ตอนเลือกไอเทมแต่งตัว) */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Prompt, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* กล่องคอนเทนเนอร์หลักของเกม */
        .game-container {
            background: var(--card-bg);
            max-width: 700px;
            width: 100%;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            color: #2d3748;
            text-align: center;
        }

        h2 {
            font-size: 1.2rem;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 10px;
        }

        /* โครงสร้างแถบสถานะความคืบหน้า (Progress Bar) */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        .progress-bar {
            flex-grow: 1;
            height: 8px;
            background-color: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.4s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 35px;
        }

        .scenario-text {
            font-size: 1.1rem;
            margin-bottom: 25px;
            white-space: pre-line;
            color: #2d3748;
        }

        /* ตารางแบ่งปุ่มเลือกแต่งตัวในด่านที่ 0 */
        .ppe-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        /* หน้าตาของปุ่มเลือกอุปกรณ์แต่งตัว */
        .ppe-item {
            padding: 15px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            background-color: #fff;
        }

        /* หน้าตาของปุ่มแต่งตัวเมื่อ "ถูกคลิกเลือก" */
        .ppe-item.selected {
            border-color: var(--accent);
            background-color: #fefcbf;
            color: #744210;
        }

        /* กล่องรวมปุ่มตัวเลือกคำตอบ */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ลักษณะทั่วไปของปุ่มคำตอบ 1,2,3,4 */
        button {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 2px solid #cbd5e0;
            padding: 14px 20px;
            font-size: 0.95rem;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease-in-out;
            font-weight: 500;
        }

        button:hover {
            border-color: var(--primary);
            background-color: #ebf8ff;
            color: var(--primary);
            transform: translateX(2px);
        }

        /* ปุ่มเริ่มเกม/ปุ่มคำสั่งพิเศษ */
        .action-btn {
            background-color: var(--primary);
            color: white;
            text-align: center;
            font-weight: 600;
            border: none;
        }

        .action-btn:hover {
            background-color: var(--primary-hover);
            color: white;
        }

        /* กล่องแจ้งเตือนสถานะความล้มเหลว หรือ ความสำเร็จ */
        .outcome-card {
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 1.05rem;
            display: none;
        }

        .outcome-card.success {
            display: block;
            background-color: #f0fff4;
            border: 1px solid var(--success);
            color: var(--success);
        }

        .outcome-card.danger {
            display: block;
            background-color: #fff5f5;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        /* ปุ่มเริ่มเกมใหม่เมื่อ Game Over */
        .restart-btn {
            background-color: #4a5568;
            color: white;
            border: none;
            text-align: center;
            margin-top: 25px;
            width: 100%;
            font-weight: 600;
        }
        
        .restart-btn:hover {
            background-color: #2d3748;
            color: white;
            transform: none;
        }
    </style>
</head>
<body>

<!-- =================================================================
     [ส่วนที่ 2] โครงสร้างหน้าเว็บ (HTML โครงเปล่า)
     ส่วนนี้ทำหน้าที่เป็นพื้นที่ว่างเพื่อให้ JavaScript นำข้อความมาแสดงผล
     ================================================================= -->
<div class="game-container">
    <header>
        <h1 id="game-title">ระบบจำลองการจัดการเหตุฉุกเฉินและสารเคมีอันตราย</h1>
        <!-- หลอด Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
            <span id="progress-lbl" class="progress-text">0%</span>
        </div>
    </header>

    <!-- พื้นที่แสดงกล่องสถานะ (ผ่าน/ไม่ผ่าน) -->
    <div id="outcome" class="outcome-card"></div>
    
    <!-- พื้นที่แสดงชื่อด่านปัจจุบัน -->
    <h2 id="stage-title"></h2>
    
    <!-- พื้นที่แสดงเนื้อเรื่องสเตจนั้นๆ -->
    <div id="scenario" class="scenario-text">กำลังโหลดระบบ...</div>
    
    <!-- พื้นที่สำหรับสร้างปุ่มเลือกอุปกรณ์แต่งตัว (จะแสดงผลเฉพาะด่านที่ 0) -->
    <div id="ppe-zone" class="ppe-grid" style="display:none;"></div>
    
    <!-- พื้นที่สำหรับใส่ปุ่มตัวเลือกคำตอบ 1, 2, 3, 4 -->
    <div id="choices" class="choices-container"></div>
</div>

<!-- =================================================================
     [ส่วนที่ 3] สมองและกลไกควบคุมเกม (JavaScript)
     นี่คือส่วนที่คุณสามารถแก้ไขเนื้อเรื่อง แก้ไขด่าน หรือเพิ่มเงื่อนไขเองได้
     ================================================================= -->
<script>

       ลอจิกจะบันทึกว่าชิ้นไหนเป็น true (ใส่) หรือ false (ไม่ได้ใส่)
       ----------------------------------------------------------------- */

    let studentName = "";

        labCoat: false,       // เสื้อกาวน์

        contactLenses: false, // คอนแทคเลนส์

        earphone: false

       [จุดแก้ไขที่ 2]: คลังเนื้อเรื่อง ด่านที่ 1 ถึง ด่านที่ 10
       คุณสามารถแก้ไขข้อความใน "" หรือเปลี่ยนตัวเลขคำตอบตรงนี้ได้เลยครับ
       - "title": ชื่อด่าน
       - "story": คำอธิบายเหตุการณ์
       - "options": ตัวเลือก 4 ข้อ (พิมพ์เลข 1-4 นำหน้าไว้ให้ผู้เล่นเห็นชัดเจน)
       - "correct": เลขข้อที่ถูกต้อง (1 หรือ 2 หรือ 3 หรือ 4)
       - "critical_error": เลขข้อที่เป็นความล้มเหลวร้ายแรง (ถ้าไม่มีให้ใส่ null)

            "options": [

            "options": [
                "1. บันทึกข้อมูลลงในสมุดแล็บส่วนตัวและนำเสนอในการประชุมกลุ่มแลบครั้งต่อไป",
                "2. แจ้งเรื่องด้วยวาจาต่อรุ่นพี่ในห้องปฏิบัติการและทำความสะอาดห้องให้เหมือนไม่มีอะไรเกิดขึ้น",
                "3. สรุปเหตุการณ์เมื่อสิ้นสุดภาคการศึกษาและส่งอาจารย์พร้อมรายงานผลการวิจัย",
                "4. กรอกแบบรายงาน SHECU.ACC.01 ออนไลน์ภายใน 3 วันหลังจากเกิดเหตุ"

            "fail_message": null

    /* ตัวแปรเก็บตำแหน่งด่านปัจจุบัน: เริ่มต้นที่ -1 หมายถึง ด่านแต่งตัว (ด่านที่ 0) */
    let currentStageIndex = -1; 

    /* -----------------------------------------------------------------
       [ฟังก์ชันหลัก]: ทำหน้าที่วาดและแสดงผลองค์ประกอบต่างๆ บนหน้าจอ
       ----------------------------------------------------------------- */
    function renderStage(index) {
    const outcomeCard = document.getElementById("outcome");
    const choicesContainer = document.getElementById("choices");
    const ppeZone = document.getElementById("ppe-zone");
    
    // ล้างข้อมูลหน้าจอเดิม
    outcomeCard.className = "outcome-card";
    outcomeCard.textContent = "";
    choicesContainer.innerHTML = "";
    ppeZone.style.display = "none";

    // ---- [ใหม่ล่าสุด] ด่านที่ -2: หน้ากรอกชื่อนักเรียนก่อนเริ่มเกม ----
    if (index === -2) {
        document.getElementById("stage-title").textContent = "ระบบลงทะเบียนนักศึกษา";
        document.getElementById("scenario").textContent = "ยินดีต้อนรับเข้าสู่ระบบจำลองปฏิบัติการ ตึกมหามกุฏ โปรดกรอกชื่อ-นามสกุลของคุณก่อนเริ่มทำการทดสอบ:";
        
        // สร้างช่องกรอกชื่อ (Input)
        const nameInput = document.createElement("input");
        nameInput.type = "text";
        nameInput.id = "student-name-input";
        nameInput.placeholder = "ตัวอย่าง: นายสมชาย ตั้งใจเรียน";
        nameInput.style.width = "95%";
        nameInput.style.padding = "12px";
        nameInput.style.fontSize = "1rem";
        nameInput.style.borderRadius = "8px";
        nameInput.style.border = "2px solid #cbd5e0";
        nameInput.style.marginBottom = "20px";
        // ถ้าเคยพิมพ์ไว้แล้วให้แสดงชื่อเดิม
        if(studentName) nameInput.value = studentName; 
        
        // นำช่องกรอกชื่อไปหย่อนไว้ในโซนเนื้อเรื่อง
        document.getElementById("scenario").appendChild(document.createElement("br"));
        document.getElementById("scenario").appendChild(document.createElement("br"));
        document.getElementById("scenario").appendChild(nameInput);

        // สร้างปุ่มถัดไป
        const nextBtn = document.createElement("button");
        nextBtn.textContent = "บันทึกข้อมูลและไปตู้ล็อกเกอร์แต่งตัว ➡️";
        nextBtn.classList.add("action-btn");
        nextBtn.onclick = () => {
            const inputValue = document.getElementById("student-name-input").value.trim();
            if (!inputValue) {
                alert("โปรดกรอกชื่อ-นามสกุลของคุณก่อนเข้าสู่เกมครับ!");
                return;
            }
            studentName = inputValue; // บันทึกชื่อลงตัวแปร
            currentStageIndex = -1;    // ย้ายไปด่านล็อกเกอร์แต่งตัว
            renderStage(currentStageIndex);
        };
        choicesContainer.appendChild(nextBtn);
        
        document.getElementById("progress").style.width = "0%";
        document.getElementById("progress-lbl").textContent = "0%";
        return;
    }

    // ---- ด่านที่ -1: โหมดตู้ล็อกเกอร์แต่งตัว (ของเดิม แต่ปรับ Progress Bar นิดหน่อย) ----
    if (index === -1) {
        document.getElementById("stage-title").textContent = "ด่านที่ 0: การเตรียมตัวเข้าพื้นที่ ณ ตึกมหามกุฏ";
        // นำชื่อนักเรียนมาทักทายในเนื้อเรื่องได้ด้วยการใช้ ${studentName}
        document.getElementById("scenario").textContent = `สวัสดีคุณ ${studentName} คุณกำลังยืนอยู่หน้าห้องปฏิบัติการวิจัยวิชาเคมีในวันแรก... มีตู้ล็อกเกอร์อุปกรณ์วางอยู่ตรงหน้า โปรดเลือกเสื้อผ้าและอุปกรณ์ป้องกัน (PPE) ที่คุณต้องการสวมใส่เข้าแล็บ:`;
        
        ppeZone.style.display = "grid";
        renderPPEButtons();

        const enterBtn = document.createElement("button");
        enterBtn.textContent = "แต่งตัวเสร็จแล้ว เดินเข้าห้องปฏิบัติการ ➡️";
        enterBtn.classList.add("action-btn");
        enterBtn.onclick = () => {
            currentStageIndex = 0;
            renderStage(currentStageIndex);
        };
        choicesContainer.appendChild(enterBtn);
        
        document.getElementById("progress").style.width = "5%";
        document.getElementById("progress-lbl").textContent = "5%";
        return;
    }

    // ---- ด่านจบเกมสำเร็จ (ของเดิม แต่เพิ่มการแสดงชื่อตอนชนะ) ----
    if (index >= stages.length) {
        document.getElementById("stage-title").textContent = "🎉 ยินดีด้วย! คุณผ่านการทดสอบ";
        document.getElementById("scenario").textContent = `นักศึกษา: ${studentName}\nคุณมีทักษะการจัดการความปลอดภัยและสารเคมีอันตรายในระดับยอดเยี่ยม สามารถปฏิบัติงานวิจัย ณ อาคารมหามกุฏได้อย่างปลอดภัยตามมาตรฐาน`;
        document.getElementById("progress").style.width = "100%";
        document.getElementById("progress-lbl").textContent = "100%";
        
        const restartBtn = document.createElement("button");
        restartBtn.textContent = "เริ่มทำแบบทดสอบใหม่อีกครั้ง";
        restartBtn.classList.add("restart-btn");
        restartBtn.onclick = () => resetGame();
        choicesContainer.appendChild(restartBtn);
        return;
    }

    // ---- [ส่วนด่านเนื้อเรื่องทั่วไป 1-10 ด้านล่างให้คงเดิมไว้] ----
        // ---- [กรณีด่านเล่นเกมปกติ 1-10] ----
        const stage = stages[index];
        document.getElementById("stage-title").textContent = `ด่านที่ ${index + 1}: ${stage.title}`;
        document.getElementById("scenario").textContent = stage.story;

        // คำนวณร้อยละเพื่อเพิ่มความยาวของหลอด Progress Bar
        const progressPercent = Math.round(((index + 1) / (stages.length + 1)) * 100);
        document.getElementById("progress").style.width = `${progressPercent}%`;
        document.getElementById("progress-lbl").textContent = `${progressPercent}%`;

        // วนลูปเพื่อนำหัวข้อตัวเลือกตัวอักษรมาสร้างเป็นปุ่มกด HTML 
        stage.options.forEach((option, optionIdx) => {
            const currentOptionNumber = optionIdx + 1; // แปลง index ลูป (0,1,2,3) ให้เป็นข้อ (1,2,3,4)
            const btn = document.createElement("button");
            btn.textContent = option;
            btn.onclick = () => handleAnswer(stage, currentOptionNumber);
            choicesContainer.appendChild(btn);
        });
    }

    /* -----------------------------------------------------------------
       [ฟังก์ชันย่อย]: วาดปุ่มเลือก PPE 4 ชิ้นลงในหน้าจอ และเก็บสถานะลงตัวแปร
       ----------------------------------------------------------------- */
    function renderPPEButtons() {
        const ppeZone = document.getElementById("ppe-zone");
        ppeZone.innerHTML = ""; // ล้างข้อมูลเดิม

        // อาร์เรย์คู่คีย์ไอเทมและชื่อปุ่ม
        const items = [
            { key: "labCoat", label: "🥼 เสื้อคลุมปฏิบัติการ" },
            { key: "goggles", label: "🥽 แว่นตานิรภัย" },
            { key: "leatherShoes", label: "👞 รองเท้าหนังหุ้มส้นหุ้มมิดชิด" },
            { key: "contactLenses", label: "👁️ ใส่คอนแทคเลนส์แฟชั่น" },
            { key: "crocsShoes", label: "🐊 รองเท้าครอคส์" },
            { key: "glasses", label: "👓 แว่นสายตา" },
            { key: "earrings", label: "💎 ต่างหูเพชร" },
            { key: "nitrileGloves", label: "🧤 ถุงมือไนไตรล์" },
            { key: "rubberGloves", label: "🥊 ถุงมือยาง" },
            { key: "earphone", label: "🎧 หูฟัง" }
        ];

        // วนลูปสร้างปุ่มแต่งตัว
        items.forEach(item => {
            const div = document.createElement("div");
            // ถ้าค่าของไอเทมนั้นเป็น true จะได้คลาส 'selected' ไปเปลี่ยนสีปุ่มไฮไลต์สีเหลือง
            div.className = `ppe-item ${userPPE[item.key] ? 'selected' : ''}`;
            div.textContent = item.label;
            
            // เมื่อคลิกปุ่ม จะทำการสลับสถานะจาก true เป็น false หรือ false เป็น true แล้ววาดใหม่
            div.onclick = () => {
                userPPE[item.key] = !userPPE[item.key];
                renderPPEButtons();
            };
            ppeZone.appendChild(div);
        });
    }

    /* -----------------------------------------------------------------
       [จุดแก้ไขที่ 3]: ระบบตรวจสอบเงื่อนไขความถูกต้องและการส่งผลต่อเนื่อง
       คุณสามารถเข้ามาเพิ่มลอจิกเงื่อนไขของชุดเสื้อผ้าในด่านอื่นๆ ที่นี่ได้
       ----------------------------------------------------------------- */
    function handleAnswer(stage, chosenOption) {
        
        // --- 🟢 ตัวอย่างเงื่อนไขต่อเนื่องใน ด่านที่ 3 (เรื่องตู้ดูดควัน n-butyl lithium) ---
        // เงื่อนไข: ถ้าเป็นด่านที่ไอดีเท่ากับ 4 (คือด่าน 3 ในแถบชื่อ) และผู้เล่นเลือกข้อถูก (ข้อ 2)
        if (stage.id === 4 && chosenOption === stage.correct) {
            // เช็กต่อว่า หากไม่ได้เลือกเสื้อกาวน์ (labCoat เป็น false) จะตายทันที
            if (!userPPE.labCoat) {
                triggerGameOver("💥 ล้มเหลวเนื่องจากเครื่องแต่งกาย: แม้คุณจะปรับหน้าต่างตู้ดูดควันถูกต้อง แต่เนื่องจากคุณลืมใส่เสื้อกาวน์เคมี สาร n-butyl lithium เกิดติดไฟเล็กน้อยและกระเด็นเปื้อนชุดนักศึกษาของคุณโดยตรงจนไฟลุกท่วมตัว!");
                return; // หยุดทำงานฟังก์ชันทันที ไม่ให้ไปด่านต่อไป
            }
        }

        // --- 🟢 ตัวอย่างเงื่อนไขต่อเนื่องใน ด่านที่ 5 (เรื่องกรดซัลฟิวริกเข้มข้นหกใส่ขา) ---
        if (stage.id === 6) {
            // เช็กกรณีลืมใส่เสื้อกาวน์
            if (!userPPE.labCoat && chosenOption === stage.correct) {
                triggerGameOver("💥 ล้มเหลวเนื่องจากเครื่องแต่งกาย: คุณพยายามวิ่งไปล้างตัวที่ Safety Shower แต่เนื่องจากคุณไม่ได้สวมเสื้อกาวน์ปกป้องเนื้อผ้า กรดเข้มข้นจึงซึมทะลุกางเกงเข้ากัดทำลายผิวหนังเนื้อเยื่อขาทันทีอย่างรุนแรงก่อนจะไปถึงฝักบัว!");
                return;
            }
            // เช็กกรณีลืมใส่แว่นตา หรือ ไปใส่คอนแทคเลนส์
            if ((!userPPE.goggles || userPPE.contactLenses) && chosenOption === stage.correct) {
                triggerGameOver("💥 ล้มเหลวเนื่องจากเครื่องแต่งกาย: สารเคมีกระเด็นโดนขาและไอระเหยกรดพุ่งขึ้นหน้า แต่เนื่องจากคุณลืมใส่แว่นตานิรภัย (หรือใส่คอนแทคเลนส์ที่ดักจับไอสารเคมีไว้ใต้เลนส์) ส่งผลให้กระจกตาไหม้และสูญเสียการมองเห็นถาวร!");
                return;
            }
        }

        // --- ระบบประเมินผลตัวเลือกแบบปกติจากสคริปต์ ---
        if (chosenOption === stage.correct) {
            // ถ้าเลือกถูก ให้เลื่อนด่านถัดไป
            currentStageIndex++;
            renderStage(currentStageIndex);
        } else if (chosenOption === stage.critical_error) {
            // ถ้าเลือกข้อที่เป็นความผิดพลาดร้ายแรง (Critical Error) ให้จบเกมทันที
            triggerGameOver(stage.fail_message);
        } else {
            // ถ้าเลือกข้อที่ผิดธรรมดา ให้ขึ้นป้ายเตือน แต่ยังไม่ตาย (ให้กดเลือกข้อใหม่ได้)
            const outcomeCard = document.getElementById("outcome");
            outcomeCard.className = "outcome-card danger";
            outcomeCard.textContent = "❌ คำตอบไม่ถูกต้อง: วิธีปฏิบัตินี้ยังไม่ปลอดภัยพอ กรุณาพิจารณาใหม่อีกครั้ง";
        }
    }

    /* -----------------------------------------------------------------
       [ฟังก์ชันย่อย]: แสดงผลหน้าจอสีแดงเมื่อ Game Over (ผู้เล่นทำแล็บพังหรือตาย)
       ----------------------------------------------------------------- */
    function triggerGameOver(message) {
    const outcomeCard = document.getElementById("outcome");
    const choicesContainer = document.getElementById("choices");
    
    document.getElementById("ppe-zone").style.display = "none";
    outcomeCard.className = "outcome-card danger";
    
    // 🔴 ปรับหัวข้อ Game over ให้ระบุชื่อนักเรียนที่ทำแล็บพังชัดเจน
    outcomeCard.textContent = `⚠ GAME OVER: คุณ ${studentName} เกิดอุบัติเหตุร้ายแรง!`;
    document.getElementById("scenario").textContent = message;
    choicesContainer.innerHTML = "";

    const resetBtn = document.createElement("button");
    resetBtn.textContent = "กลับไปเริ่มต้นแต่งตัวและเข้าแล็บใหม่";
    resetBtn.classList.add("restart-btn");
    resetBtn.onclick = () => resetGame();
    choicesContainer.appendChild(resetBtn);
}

    /* -----------------------------------------------------------------
       [ฟังก์ชันย่อย]: รีเซ็ตเคลียร์ค่าทุกอย่างในระบบเพื่อเริ่มนับหนึ่งใหม่
       ----------------------------------------------------------------- */
    function resetGame() {
        // คืนค่า PPE ทั้งหมดให้กลายเป็นยังไม่ได้เลือก (false)
        userPPE = { labCoat: false, goggles: false, leatherShoes: false, contactLenses: false };
        currentStageIndex = -1; // วิ่งกลับไปหน้าด่านล็อกเกอร์สวมชุด
        renderStage(currentStageIndex);
    }

    // เดิมเป็น renderStage(currentStageIndex); ให้เปลี่ยนตัวแปรด้านบนและฟังก์ชันเป็นแบบนี้
    currentStageIndex = -2; 
    renderStage(currentStageIndex);
    </script>
